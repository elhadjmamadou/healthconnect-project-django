{% extends "base.html" %}

{% block title %}Mot de passe réinitialisé{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
  <div class="glass-panel rounded-2xl p-8 space-y-6 text-center">

    <span class="material-symbols-outlined text-secondary text-5xl">verified_user</span>

    <div>
      <h1 class="text-xl font-bold text-on-surface">Mot de passe réinitialisé !</h1>
      <p class="text-on-surface-variant text-sm mt-2">
        Votre mot de passe a été modifié avec succès. Vous pouvez maintenant vous connecter avec vos nouveaux identifiants.
      </p>
    </div>

    <a href="{% url 'users:login' %}"
       class="glow-btn inline-flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-medium">
      <span class="material-symbols-outlined text-base">login</span>
      Se connecter
    </a>

  </div>
</div>
{% endblock %}
