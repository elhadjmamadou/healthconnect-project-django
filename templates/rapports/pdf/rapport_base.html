<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <style>
    @page {
      size: A4;
      margin: 2cm 1.6cm 2.2cm 1.6cm;
      @bottom-center {
        content: "HealthConnect — Page " counter(page) " sur " counter(pages);
        font-size: 8pt;
        color: #9aa5b1;
      }
    }
    body {
      font-family: "Helvetica Neue", Arial, sans-serif;
      color: #1f2933;
      font-size: 11pt;
      line-height: 1.5;
      margin: 0;
    }
    .entete {
      border-bottom: 3px solid #00a572;
      padding-bottom: 14px;
      margin-bottom: 24px;
    }
    .marque {
      font-size: 20pt;
      font-weight: 800;
      color: #00a572;
    }
    .marque span { color: #22808d; }
    .slogan {
      font-size: 9pt;
      color: #7b8794;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .titre-rapport {
      font-size: 15pt;
      font-weight: 700;
      margin: 18px 0 4px;
      color: #102a43;
    }
    .meta { font-size: 9.5pt; color: #627d98; }
    h2 {
      font-size: 12pt;
      color: #00a572;
      border-left: 4px solid #22d3ee;
      padding-left: 8px;
      margin: 26px 0 12px;
    }
    table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
    th, td {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid #e4e7eb;
      font-size: 10.5pt;
    }
    th { background: #f0fdf9; color: #102a43; font-weight: 600; }
    td.valeur { text-align: right; font-weight: 700; color: #102a43; }
    .cartes { display: flex; gap: 12px; margin-bottom: 8px; }
    .carte {
      flex: 1;
      border: 1px solid #e4e7eb;
      border-radius: 8px;
      padding: 12px 14px;
      background: #fafdfc;
    }
    .carte .chiffre { font-size: 18pt; font-weight: 800; color: #00a572; }
    .carte .libelle {
      font-size: 8.5pt; color: #7b8794;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="entete">
    <div class="marque">Health<span>Connect</span></div>
    <div class="slogan">Le Chirurgien Numérique</div>
    <div class="titre-rapport">{{ titre }}</div>
    <div class="meta">
      Période : du {{ debut|date:"d/m/Y" }} au {{ fin|date:"d/m/Y" }} ·
      Généré le {{ date_generation|date:"d/m/Y à H:i" }}
      {% if genere_par %} · par {{ genere_par.get_full_name|default:genere_par.email }}{% endif %}
    </div>
  </div>

  {% block contenu %}{% endblock %}
</body>
</html>
